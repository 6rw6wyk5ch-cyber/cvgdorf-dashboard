<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CVG Dorf">
<meta name="theme-color" content="#1A1208">
<title>CVG Dorf — Criadero</title>
<link rel="manifest" href="#" id="manifest-link">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1A1208;
  --paper: #F7F2E8;
  --gold: #B8860B;
  --gold-light: #D4A017;
  --amber: #C47A2B;
  --rust: #8B3A2A;
  --sage: #4A7A50;
  --sage-light: #6A9A70;
  --muted: #7A6E5A;
  --sand: #E8DFC8;
  --sand-dark: #D8CDB8;
  --cream: #FAF7F0;
  --white: #FFFFFF;
  --overlay: rgba(26,18,8,0.85);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
}

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0;
  background: var(--ink);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; gap: 24px;
}
#loading .logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 300;
  color: var(--paper); letter-spacing: 0.15em;
  text-transform: uppercase;
}
#loading .logo em { color: var(--gold-light); font-style: italic; }
#loading .spinner {
  width: 32px; height: 32px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: var(--gold-light);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
#loading .status { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HEADER ── */
.header {
  background: var(--ink);
  padding: env(safe-area-inset-top, 0px) 0 0;
  position: sticky; top: 0; z-index: 20;
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
}
.header-logo {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-size: 18px;
  color: var(--paper); letter-spacing: 0.08em;
}
.header-logo em { color: var(--gold-light); font-style: italic; }
.header-right { display: flex; align-items: center; gap: 10px; }
.last-update { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 0.06em; }
.refresh-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.6); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.refresh-btn:active { background: rgba(255,255,255,0.15); transform: rotate(180deg); }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; }

/* ── STAT STRIP ── */
.stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: rgba(255,255,255,0.06);
}
.stat {
  background: var(--ink);
  padding: 10px 8px 12px;
  text-align: center; cursor: pointer;
  transition: background 0.15s; border: none; width: 100%;
  font-family: 'DM Mono', monospace;
}
.stat.active { background: #2A1E0C; }
.stat:active { background: #2A1E0C; }
.stat-n {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 600; line-height: 1;
}
.stat-n.g { color: var(--sage-light); }
.stat-n.a { color: var(--gold-light); }
.stat-n.r { color: #E07060; }
.stat-l { font-size: 8px; letter-spacing: 0.12em; opacity: 0.4;
  margin-top: 3px; text-transform: uppercase; color: var(--paper); }

/* ── FILTERS ── */
.filters {
  display: flex; gap: 6px; padding: 10px 14px;
  overflow-x: auto; scrollbar-width: none;
  background: var(--sand); border-bottom: 1px solid var(--sand-dark);
}
.filters::-webkit-scrollbar { display: none; }
.ftab {
  flex-shrink: 0; padding: 4px 12px; border-radius: 2px;
  border: 1px solid #BEB3A0; background: transparent;
  color: var(--muted); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; cursor: pointer;
  font-family: 'DM Mono', monospace; transition: all 0.15s;
}
.ftab.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ── SECTION ── */
.section { display: none; }
.section.visible { display: block; }

.sec-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 8px;
}
.sec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sd-g { background: var(--sage); }
.sd-a { background: var(--gold); }
.sd-r { background: var(--rust); }
.sec-title { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.sec-count { margin-left: auto; font-size: 10px; color: var(--muted); }

/* ── BREED GROUP ── */
.breed-group { margin-bottom: 2px; }
.breed-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px 4px;
}
.btag {
  font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 2px; font-weight: 500; flex-shrink: 0;
}
.bt-beagle { background: #EAD8A0; color: #5C4010; }
.bt-dogo { background: #D0C5E8; color: #3C2A60; }
.bt-sabueso { background: #C8DCCB; color: #1E4020; }
.bt-pbm { background: #C8DCE8; color: #1A3050; }
.bt-maltes { background: #E8C8DC; color: #501A40; }
.bt-default { background: var(--sand); color: var(--muted); }
.bcam { font-size: 9px; color: var(--muted); }

/* ── PUP ROW ── */
.pup {
  display: flex; align-items: center;
  padding: 9px 16px; border-bottom: 1px solid #EDE5D0;
  background: #FDFAF4;
}
.pup:nth-child(even) { background: var(--cream); }
.pnum {
  width: 34px; height: 34px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; flex-shrink: 0; margin-right: 10px;
}
.pm { background: #C8DAEA; color: #1A3C5A; }
.pf { background: #EAC8D0; color: #5A1A2A; }
.pinfo { flex: 1; min-width: 0; }
.p-r1 { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
.p-raza { font-size: 11px; font-weight: 500; }
.p-sexo { font-size: 9px; color: var(--muted); }
.p-camada { font-size: 9px; color: var(--muted); }
.p-r2 { font-size: 9px; color: var(--muted); }
.vacs { display: flex; align-items: center; gap: 3px; margin-top: 3px; }
.vlbl { font-size: 8px; color: var(--muted); margin-right: 1px; }
.vdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.vd-done { background: var(--sage); }
.vd-empty { background: #E0D8C0; border: 1px solid #C8BDA0; }
.vsep { width: 1px; height: 9px; background: #D8CDB4; margin: 0 3px; }
.pright { text-align: right; flex-shrink: 0; margin-left: 8px; }
.pprecio { font-size: 11px; color: var(--ink); }
.rdot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-top: 3px; }
.rd-no { background: #E07070; } .rd-warn { background: var(--amber); } .rd-yes { background: var(--sage); }

/* ── RESERVA CARD ── */
.rcard {
  margin: 4px 14px 6px;
  background: #FDFAF4; border: 1px solid #D8CDB4;
  border-radius: 4px; overflow: hidden;
}
.rtop {
  display: flex; align-items: center;
  padding: 10px 12px; gap: 10px; cursor: pointer;
}
.rnum {
  width: 34px; height: 34px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; flex-shrink: 0;
}
.rinfo { flex: 1; }
.rname { font-size: 11px; font-weight: 500; }
.rsub { font-size: 9px; color: var(--muted); margin-top: 2px; }
.rbadge {
  font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 2px; flex-shrink: 0;
}
.rb-a { background: #F5E8C8; color: #7A4A0A; border: 1px solid #D8B870; }
.rb-p { background: #E8F0DC; color: #2A5020; border: 1px solid #8AB070; }
.rbody { padding: 0 12px 12px; border-top: 1px solid #EAE2CE; display: none; }
.prog { height: 3px; background: #E0D8C0; border-radius: 2px; margin: 10px 0 8px; }
.progf { height: 100%; border-radius: 2px; }
.pf-p { background: var(--amber); } .pf-f { background: var(--sage); }
.rrows { display: flex; flex-direction: column; gap: 4px; }
.rrow { display: flex; justify-content: space-between; font-size: 10px; }
.rk { color: var(--muted); } .rv { color: var(--ink); }
.rv-g { color: var(--sage); } .rv-a { color: var(--amber); }
.rnote {
  font-size: 9px; color: var(--muted); margin-top: 8px;
  padding-top: 8px; border-top: 1px dashed #D8CDB4; font-style: italic;
}
.rvacs { display: flex; align-items: center; gap: 3px; margin-top: 10px; padding-top: 8px; border-top: 1px solid #EAE2CE; }

/* ── VAC ALERT SECTION ── */
.vac-section { padding: 0 0 16px; }
.vac-alert-card {
  margin: 4px 14px;
  border-radius: 4px; overflow: hidden;
  border-left: 3px solid;
}
.va-overdue { border-color: var(--rust); background: #FDF0EE; }
.va-soon { border-color: var(--gold); background: #FDF8EE; }
.va-future { border-color: #D0C8B8; background: var(--cream); }
.va-inner { padding: 8px 12px; }
.va-top { display: flex; justify-content: space-between; align-items: center; }
.va-name { font-size: 11px; font-weight: 500; }
.va-badge { font-size: 8px; padding: 2px 7px; border-radius: 2px; letter-spacing: 0.08em; }
.vab-overdue { background: var(--rust); color: #fff; }
.vab-soon { background: var(--gold); color: #fff; }
.vab-future { background: #D0C8B8; color: var(--muted); }
.va-sub { font-size: 9px; color: var(--muted); margin-top: 3px; }
.va-vacs { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.va-vac { font-size: 8px; padding: 2px 7px; border-radius: 2px; letter-spacing: 0.04em; }
.vv-due { background: var(--rust); color: #fff; }
.vv-soon { background: var(--gold); color: #fff; }
.vv-future { background: #E0D8C0; color: var(--muted); }
.vv-done { background: var(--sage); color: #fff; }

.divider { height: 8px; background: var(--sand); }
.empty-msg { text-align: center; padding: 32px 16px; font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 20;
}
.nav-btn {
  flex: 1; padding: 10px 4px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.35); transition: color 0.15s;
  font-family: 'DM Mono', monospace;
}
.nav-btn.active { color: var(--gold-light); }
.nav-btn:active { color: rgba(255,255,255,0.6); }
.nav-icon { font-size: 16px; }
.nav-lbl { font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; }

.main-content { padding-bottom: 60px; }

/* ── SEARCH ── */
.search-bar {
  padding: 8px 14px;
  background: var(--sand); border-bottom: 1px solid var(--sand-dark);
  display: none;
}
.search-bar.visible { display: block; }
.search-input {
  width: 100%; padding: 7px 12px; border-radius: 2px;
  border: 1px solid #BEB3A0; background: var(--cream);
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink);
  outline: none;
}
.search-input:focus { border-color: var(--amber); }
</style>
</head>
<body>

<div id="loading">
  <div class="logo">Von <em>Grünes</em> Dorf</div>
  <div class="spinner"></div>
  <div class="status" id="load-status">Cargando datos...</div>
</div>

<div class="header">
  <div class="header-inner">
    <div class="header-logo">Von <em>Grünes</em> Dorf</div>
    <div class="header-right">
      <div class="last-update" id="last-update">—</div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()" title="Actualizar">↻</button>
    </div>
  </div>
  <div class="stats">
    <button class="stat active" id="stat-libre" onclick="setTab('libre',this)">
      <div class="stat-n g" id="cnt-libre">—</div>
      <div class="stat-l">Libres</div>
    </button>
    <button class="stat" id="stat-anticipo" onclick="setTab('anticipo',this)">
      <div class="stat-n a" id="cnt-anticipo">—</div>
      <div class="stat-l">Con anticipo</div>
    </button>
    <button class="stat" id="stat-vacunas" onclick="setTab('vacunas',this)">
      <div class="stat-n r" id="cnt-vacunas">—</div>
      <div class="stat-l">Vac. urgentes</div>
    </button>
  </div>
  <div class="filters" id="filters">
    <button class="ftab on" onclick="setRaza('all',this)">Todos</button>
  </div>
</div>

<div class="search-bar" id="search-bar">
  <input class="search-input" id="search-input" placeholder="Buscar por número, raza, madre..." oninput="applyFilters()">
</div>

<div class="main-content" id="main-content">
  <!-- populated by JS -->
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="setTab('libre',document.getElementById('stat-libre'))">
    <div class="nav-icon">🐕</div><div class="nav-lbl">Libres</div>
  </button>
  <button class="nav-btn" onclick="setTab('anticipo',document.getElementById('stat-anticipo'))">
    <div class="nav-icon">📋</div><div class="nav-lbl">Anticipo</div>
  </button>
  <button class="nav-btn" onclick="setTab('vacunas',document.getElementById('stat-vacunas'))">
    <div class="nav-icon">💉</div><div class="nav-lbl">Vacunas</div>
  </button>
  <button class="nav-btn" onclick="toggleSearch()">
    <div class="nav-icon">🔍</div><div class="nav-lbl">Buscar</div>
  </button>
</div>

<script>
const API_KEY   = 'AIzaSyCrIsF7R_koev3lU2H0jW4y9L7-tk_vAYY';
const SHEET_ID  = '14GzqWO5Fx2toh-gByAIIlon-QV0IPgOwNNtBARhg4EE';
const SHEET_TAB = 'Cachorros';
const RANGE     = `${SHEET_TAB}!A:R`;

// Col indices (0-based) matching our sheet
const COL = {
  no:0, camada:1, tipo:2, madre:3, padre:4, sexo:5, fn:6,
  parvo:7, cano1:8, cano2:9, hunt1:10, hunt2:11,
  estado:12, precio:13, anticipo:14, pendiente:15, notas:16, fecha_camada:17
};

const PROTOCOL = { parvo:28, cano1:42, cano2:56, hunt1:21, hunt2:22 };
const VAC_LABELS = { parvo:'Parvomune', cano1:'Canomune×1', cano2:'Canomune×2', hunt1:'Hunter×1', hunt2:'Hunter×2' };

let allData = [];
let curTab = 'libre';
let curRaza = 'all';
let searchActive = false;

function parseDate(s) {
  if (!s) return null;
  const p = s.split('/');
  if (p.length !== 3) return null;
  return new Date(+p[2], +p[1]-1, +p[0]);
}

function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }

function weeksOld(fn) {
  if (!fn) return 0;
  return Math.floor((today()-fn)/(7*86400000));
}

function vacDueDate(fn, days) {
  if (!fn) return null;
  const d = new Date(fn); d.setDate(d.getDate()+days); return d;
}

function vacStatus(fn, doneVal, days) {
  const done = doneVal && doneVal.trim();
  if (done) return 'done';
  const due = vacDueDate(fn, days);
  if (!due) return 'unknown';
  const diff = Math.floor((due - today())/86400000);
  if (diff < 0) return 'overdue';
  if (diff <= 7) return 'soon';
  return 'future';
}

function vacDiff(fn, days) {
  const due = vacDueDate(fn, days);
  if (!due) return null;
  return Math.floor((due - today())/86400000);
}

function rdotClass(weeks) {
  if (weeks < 6) return 'rd-no';
  if (weeks < 8) return 'rd-warn';
  return 'rd-yes';
}

function breedTag(tipo) {
  const t = tipo.toLowerCase();
  if (t.includes('beagle')) return 'bt-beagle';
  if (t.includes('dogo')) return 'bt-dogo';
  if (t.includes('sabueso')) return 'bt-sabueso';
  if (t.includes('belga') || t.includes('malinois')) return 'bt-pbm';
  if (t.includes('malt') || t.includes('golden')) return 'bt-maltes';
  return 'bt-default';
}

function shortRaza(tipo) {
  if (tipo.includes('Pastor Belga Malinois')) return 'P.B. Malinois';
  if (tipo.includes('Maltés') || tipo.includes('Golden')) return 'Maltés/Golden';
  return tipo;
}

function fmtQ(v) {
  if (!v || v === '') return '—';
  const n = parseFloat(v);
  return isNaN(n) ? v : 'Q' + n.toLocaleString('es-GT');
}

function vdotHtml(done) {
  return `<div class="vdot ${done?'vd-done':'vd-empty'}"></div>`;
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('load-status').textContent = 'Conectando con Google Sheets...';

  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const rows = json.values || [];

    if (rows.length < 2) throw new Error('No data found');

    // Skip header row
    allData = rows.slice(1).map(r => ({
      no:       parseInt(r[COL.no]) || 0,
      camada:   r[COL.camada] || '',
      tipo:     r[COL.tipo] || '',
      madre:    r[COL.madre] || '',
      padre:    r[COL.padre] || '',
      sexo:     r[COL.sexo] || '',
      fn:       parseDate(r[COL.fn]),
      fnStr:    r[COL.fn] || '',
      parvo:    r[COL.parvo] || '',
      cano1:    r[COL.cano1] || '',
      cano2:    r[COL.cano2] || '',
      hunt1:    r[COL.hunt1] || '',
      hunt2:    r[COL.hunt2] || '',
      estado:   r[COL.estado] || '',
      precio:   r[COL.precio] || '',
      anticipo: r[COL.anticipo] || '',
      pendiente:r[COL.pendiente] || '',
      notas:    r[COL.notas] || '',
      fecha_camada: r[COL.fecha_camada] || '',
    })).filter(r => r.no > 0);

    buildRazaFilters();
    renderAll();

    const now = new Date();
    document.getElementById('last-update').textContent =
      now.toLocaleTimeString('es-GT', {hour:'2-digit',minute:'2-digit'});

    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('load-status').textContent = 'Error: ' + e.message;
    console.error(e);
  }
  btn.classList.remove('spinning');
}

function buildRazaFilters() {
  const criadero = allData.filter(r => r.estado === 'Criadero');
  const razas = [...new Set(criadero.map(r => r.tipo))].sort();
  const filters = document.getElementById('filters');
  filters.innerHTML = '<button class="ftab on" onclick="setRaza(\'all\',this)">Todos</button>';
  razas.forEach(raza => {
    const short = shortRaza(raza);
    const btn = document.createElement('button');
    btn.className = 'ftab';
    btn.textContent = short;
    btn.onclick = function(){ setRaza(raza, this); };
    filters.appendChild(btn);
  });
}

function renderAll() {
  const criadero = allData.filter(r => r.estado === 'Criadero');
  const libres = criadero.filter(r => !r.anticipo || r.anticipo === '');
  const conAnticipo = criadero.filter(r => r.anticipo && parseFloat(r.pendiente) > 0);

  // Count urgent vacunas
  const urgentVacs = criadero.filter(r => {
    return ['parvo','cano1','cano2','hunt1','hunt2'].some(v => {
      const st = vacStatus(r.fn, r[v], PROTOCOL[v]);
      return st === 'overdue' || st === 'soon';
    });
  });

  document.getElementById('cnt-libre').textContent = libres.length;
  document.getElementById('cnt-anticipo').textContent = conAnticipo.length;
  document.getElementById('cnt-vacunas').textContent = urgentVacs.length;

  renderLibres(libres);
  renderAnticipo(conAnticipo);
  renderVacunas(criadero);
  applyFilters();
}

function groupBySection(pups) {
  const groups = new Map();
  pups.forEach(p => {
    const key = p.camada + '|' + p.madre + '|' + p.padre;
    if (!groups.has(key)) groups.set(key, { camada:p.camada, madre:p.madre, padre:p.padre,
      tipo:p.tipo, fecha:p.fecha_camada, pups:[] });
    groups.get(key).pups.push(p);
  });
  return [...groups.values()];
}

function buildVacHTML(criadero) {
  const today_ = today();
  // For each cachorro, check all vaccines
  const alerts = [];
  criadero.forEach(p => {
    const vacs = ['parvo','cano1','cano2','hunt1','hunt2'];
    const urgentVacs = vacs.filter(v => {
      const st = vacStatus(p.fn, p[v], PROTOCOL[v]);
      return st === 'overdue' || st === 'soon' || st === 'future';
    });
    if (!urgentVacs.length) return;
    const worstStatus = urgentVacs.some(v => vacStatus(p.fn,p[v],PROTOCOL[v])==='overdue') ? 'overdue'
      : urgentVacs.some(v => vacStatus(p.fn,p[v],PROTOCOL[v])==='soon') ? 'soon' : 'future';
    alerts.push({ pup:p, vacs:urgentVacs, status:worstStatus });
  });

  alerts.sort((a,b) => {
    const order = {overdue:0,soon:1,future:2};
    return (order[a.status]||2) - (order[b.status]||2);
  });

  const overdue = alerts.filter(a=>a.status==='overdue').length;
  const soon = alerts.filter(a=>a.status==='soon').length;

  let html = `<div class="section" id="sec-vacunas">
    <div class="sec-head"><div class="sec-dot sd-r"></div>
    <div class="sec-title">Control de vacunas</div>
    <div class="sec-count">${overdue} vencidas · ${soon} próximas</div></div>`;

  if (!alerts.length) {
    html += `<div class="empty-msg">✓ Todas las vacunas al día</div>`;
  } else {
    alerts.forEach(a => {
      const p = a.pup; const w = p.fn ? weeksOld(p.fn) : 0;
      const cls = a.status==='overdue'?'va-overdue':a.status==='soon'?'va-soon':'va-future';
      const badgeCls = a.status==='overdue'?'vab-overdue':a.status==='soon'?'vab-soon':'vab-future';
      const badgeTxt = a.status==='overdue'?'VENCIDA':a.status==='soon'?'PRÓXIMA':'FUTURA';
      let vacPills = a.vacs.map(v => {
        const st = vacStatus(p.fn, p[v], PROTOCOL[v]);
        const diff = vacDiff(p.fn, PROTOCOL[v]);
        const pillCls = st==='overdue'?'vv-due':st==='soon'?'vv-soon':st==='future'?'vv-future':'vv-done';
        const diffTxt = diff!==null ? (diff<0?` (${Math.abs(diff)}d atrás)`:diff===0?' (hoy)':` (${diff}d)`) : '';
        return `<span class="va-vac ${pillCls}">${VAC_LABELS[v]}${diffTxt}</span>`;
      }).join('');

      html += `<div class="vac-alert-card ${cls}">
        <div class="va-inner">
          <div class="va-top">
            <div class="va-name">No.${p.no} — ${shortRaza(p.tipo)} ${p.sexo}</div>
            <span class="va-badge ${badgeCls}">${badgeTxt}</span>
          </div>
          <div class="va-sub">${p.camada} · ${p.madre} × ${p.padre} · ${w} sem · ${p.fnStr}</div>
          <div class="va-vacs">${vacPills}</div>
        </div>
      </div>`;
    });
  }
  return html + `</div>`;
}

function renderAll() {
  const criadero = allData.filter(r => r.estado === 'Criadero');
  const libres = criadero.filter(r => !r.anticipo || r.anticipo === '');
  const conAnticipo = criadero.filter(r => r.anticipo && parseFloat(r.pendiente||0) > 0);
  const urgentVacs = criadero.filter(r =>
    ['parvo','cano1','cano2','hunt1','hunt2'].some(v =>
      ['overdue','soon'].includes(vacStatus(r.fn, r[v], PROTOCOL[v]))));

  document.getElementById('cnt-libre').textContent = libres.length;
  document.getElementById('cnt-anticipo').textContent = conAnticipo.length;
  document.getElementById('cnt-vacunas').textContent = urgentVacs.length;

  document.getElementById('main-content').innerHTML =
    buildLibreHTML(libres) +
    buildAnticipHTML(conAnticipo) +
    buildVacHTML(criadero);

  applyTab();
}

function setTab(tab, cell) {
  curTab = tab;
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
  if (cell) cell.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navIdx = {libre:0,anticipo:1,vacunas:2};
  const navBtns = document.querySelectorAll('.nav-btn');
  if (navIdx[tab] !== undefined) navBtns[navIdx[tab]].classList.add('active');
  applyTab();
}

function applyTab() {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  const sec = document.getElementById('sec-' + curTab);
  if (sec) sec.classList.add('visible');
  applyFilters();
}

function setRaza(raza, btn) {
  curRaza = raza;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  document.querySelectorAll('.pup, .rcard, .vac-alert-card').forEach(el => {
    const raza = el.dataset.raza || '';
    const search = (el.dataset.search || '').toLowerCase();
    const razaOk = curRaza === 'all' || raza === curRaza;
    const searchOk = !q || search.includes(q);
    el.style.display = (razaOk && searchOk) ? '' : 'none';
  });
  // Hide breed-group headers if all pups hidden
  document.querySelectorAll('.breed-group').forEach(g => {
    const visible = [...g.querySelectorAll('.pup')].some(p => p.style.display !== 'none');
    g.style.display = visible ? '' : 'none';
  });
}

function toggleCard(hdr) {
  const body = hdr.nextElementSibling;
  body.style.display = body.style.display === 'block' ? 'none' : 'block';
}

function toggleSearch() {
  searchActive = !searchActive;
  const bar = document.getElementById('search-bar');
  bar.classList.toggle('visible', searchActive);
  if (searchActive) document.getElementById('search-input').focus();
  else { document.getElementById('search-input').value=''; applyFilters(); }
  document.querySelectorAll('.nav-btn')[3].classList.toggle('active', searchActive);
}
