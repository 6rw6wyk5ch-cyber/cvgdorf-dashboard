<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CVG Dorf">
<meta name="theme-color" content="#1A1208">
<link rel="apple-touch-icon" href="icon.png">
<title>CVG Dorf</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1A1208;--paper:#F7F2E8;--gold:#B8860B;--gold-l:#D4A017;--amber:#C47A2B;--rust:#8B3A2A;--sage:#4A7A50;--sage-l:#6A9A70;--muted:#7A6E5A;--sand:#E8DFC8;--sand-d:#D8CDB8;--cream:#FAF7F0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;padding-bottom:64px}
#loading{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:20px;transition:opacity .4s}
#loading.fade{opacity:0;pointer-events:none}
.ld-logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--paper);letter-spacing:.15em;text-transform:uppercase}
.ld-logo em{color:var(--gold-l);font-style:italic}
.ld-spin{width:28px;height:28px;border:2px solid rgba(255,255,255,.12);border-top-color:var(--gold-l);border-radius:50%;animation:spin .8s linear infinite}
.ld-txt{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.1em}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr{background:var(--ink);position:sticky;top:0;z-index:20;padding:env(safe-area-inset-top,0) 0 0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 11px}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:17px;color:var(--paper);letter-spacing:.08em}
.hdr-logo em{color:var(--gold-l);font-style:italic}
.hdr-r{display:flex;align-items:center;gap:8px}
.upd{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.05em}
.rfbtn{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.rfbtn:active{background:rgba(255,255,255,.15);transform:rotate(180deg)}
.rfbtn.spin{animation:spin .8s linear infinite}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.05)}
.stt{background:var(--ink);padding:10px 6px 12px;text-align:center;cursor:pointer;transition:background .15s;border:none;width:100%;font-family:'DM Mono',monospace}
.stt.on,.stt:active{background:#2A1E0C}
.stt-n{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;line-height:1}
.stt-n.g{color:#7FC77A}.stt-n.a{color:var(--gold-l)}.stt-n.r{color:#E07060}
.stt-l{font-size:8px;letter-spacing:.1em;opacity:.4;margin-top:2px;text-transform:uppercase;color:var(--paper)}
.fltrs{display:flex;gap:5px;padding:9px 14px;overflow-x:auto;scrollbar-width:none;background:var(--sand);border-bottom:1px solid var(--sand-d)}
.fltrs::-webkit-scrollbar{display:none}
.ftb{flex-shrink:0;padding:4px 11px;border-radius:2px;border:1px solid #BEB3A0;background:transparent;color:var(--muted);font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.ftb.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.srch{padding:8px 14px;background:var(--sand);border-bottom:1px solid var(--sand-d);display:none}
.srch.show{display:block}
.srch input{width:100%;padding:7px 11px;border-radius:2px;border:1px solid #BEB3A0;background:var(--cream);font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);outline:none}
.srch input:focus{border-color:var(--amber)}
.sec{display:none}.sec.on{display:block}
.sec-hd{display:flex;align-items:center;gap:9px;padding:13px 16px 7px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot-g{background:var(--sage)}.sdot-a{background:var(--gold)}.sdot-r{background:var(--rust)}
.sec-ttl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.sec-cnt{margin-left:auto;font-size:10px;color:var(--muted)}
.bg-hdr{display:flex;align-items:center;gap:7px;padding:7px 16px 3px}
.btag{font-size:8px;letter-spacing:.09em;text-transform:uppercase;padding:2px 8px;border-radius:2px;font-weight:500;flex-shrink:0}
.bt-b{background:#EAD8A0;color:#5C4010}.bt-d{background:#D0C5E8;color:#3C2A60}.bt-s{background:#C8DCCB;color:#1E4020}.bt-p{background:#C8DCE8;color:#1A3050}.bt-m{background:#E8C8DC;color:#501A40}.bt-x{background:var(--sand);color:var(--muted)}
.bcam{font-size:9px;color:var(--muted)}
.pup{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid #EDE5D0;background:#FDFAF4}
.pup:nth-child(even){background:var(--cream)}
.pno{width:33px;height:33px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-right:10px}
.pm{background:#C8DAEA;color:#1A3C5A}.pf{background:#EAC8D0;color:#5A1A2A}
.pinf{flex:1;min-width:0}
.pr1{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.praza{font-size:11px;font-weight:500}.psex{font-size:9px;color:var(--muted)}.pcam{font-size:9px;color:var(--muted)}
.pr2{font-size:9px;color:var(--muted);margin-bottom:3px}
.vrow{display:flex;align-items:center;gap:3px}
.vl{font-size:8px;color:var(--muted);margin-right:1px}
.vd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.vd-y{background:var(--sage)}.vd-n{background:#E0D8C0;border:1px solid #C8BDA0}
.vsep{width:1px;height:9px;background:#D8CDB4;margin:0 3px}
.prt{text-align:right;flex-shrink:0;margin-left:8px}
.pprc{font-size:11px;color:var(--ink)}
.rdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-top:3px}
.rd-n{background:#E07070}.rd-w{background:var(--amber)}.rd-y{background:var(--sage)}
.rc{margin:4px 14px 6px;background:#FDFAF4;border:1px solid #D8CDB4;border-radius:4px;overflow:hidden}
.rc-top{display:flex;align-items:center;padding:10px 11px;gap:9px;cursor:pointer}
.rno{width:33px;height:33px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.ri{flex:1}.rn{font-size:11px;font-weight:500}.rs{font-size:9px;color:var(--muted);margin-top:1px}
.rbdg{font-size:8px;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:2px;flex-shrink:0;white-space:nowrap}
.rbdg-a{background:#F5E8C8;color:#7A4A0A;border:1px solid #D8B870}
.rc-body{padding:0 11px 11px;border-top:1px solid #EAE2CE;display:none}
.prog{height:3px;background:#E0D8C0;border-radius:2px;margin:9px 0 7px}
.progf{height:100%;border-radius:2px;background:var(--amber)}
.rrows{display:flex;flex-direction:column;gap:3px}
.rr{display:flex;justify-content:space-between;font-size:10px}
.rk{color:var(--muted)}.rv{color:var(--ink)}.rv-g{color:var(--sage)}.rv-a{color:var(--amber)}
.rnote{font-size:9px;color:var(--muted);margin-top:7px;padding-top:7px;border-top:1px dashed #D8CDB4;font-style:italic}
.rvacs{display:flex;align-items:center;gap:3px;margin-top:9px;padding-top:7px;border-top:1px solid #EAE2CE}
.va{margin:4px 14px 4px;border-radius:4px;overflow:hidden;border-left:3px solid}
.va-ov{border-color:var(--rust);background:#FDF0EE}
.va-sn{border-color:var(--gold);background:#FDF8EE}
.va-in{padding:8px 11px}
.va-top{display:flex;justify-content:space-between;align-items:center}
.va-nm{font-size:11px;font-weight:500}
.va-bdg{font-size:8px;padding:2px 7px;border-radius:2px;letter-spacing:.07em}
.vab-ov{background:var(--rust);color:#fff}.vab-sn{background:var(--gold);color:#fff}
.va-sub{font-size:9px;color:var(--muted);margin-top:2px}
.va-pills{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.vp{font-size:8px;padding:2px 7px;border-radius:2px}
.vp-ov{background:var(--rust);color:#fff}.vp-sn{background:var(--gold);color:#fff}
.empty{text-align:center;padding:28px 16px;font-size:10px;color:var(--muted);letter-spacing:.06em}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--ink);display:flex;padding-bottom:env(safe-area-inset-bottom,0);border-top:1px solid rgba(255,255,255,.06);z-index:20}
.nb{flex:1;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);transition:color .15s;font-family:'DM Mono',monospace}
.nb.on{color:var(--gold-l)}.nb:active{color:rgba(255,255,255,.6)}
.nb-ic{font-size:15px}.nb-lb{font-size:8px;letter-spacing:.07em;text-transform:uppercase}
</style>
</head>
<body>
<div id="loading">
  <div class="ld-logo">Von <em>Grünes</em> Dorf</div>
  <div class="ld-spin"></div>
  <div class="ld-txt" id="ld-txt">Conectando...</div>
</div>
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">Von <em>Grünes</em> Dorf</div>
    <div class="hdr-r">
      <div class="upd" id="upd">--</div>
      <button class="rfbtn" id="rfbtn" onclick="loadData()">&#x21BB;</button>
    </div>
  </div>
  <div class="stats">
    <button class="stt on" id="st-libre" onclick="setTab('libre',this)">
      <div class="stt-n g" id="cn-libre">--</div><div class="stt-l">Libres</div>
    </button>
    <button class="stt" id="st-anticipo" onclick="setTab('anticipo',this)">
      <div class="stt-n a" id="cn-anticipo">--</div><div class="stt-l">Con anticipo</div>
    </button>
    <button class="stt" id="st-vacunas" onclick="setTab('vacunas',this)">
      <div class="stt-n r" id="cn-vacunas">--</div><div class="stt-l">Vac. urgentes</div>
    </button>
  </div>
  <div class="fltrs" id="fltrs">
    <button class="ftb on" onclick="setRaza('all',this)">Todos</button>
  </div>
</div>
<div class="srch" id="srch">
  <input id="srch-in" placeholder="Buscar numero, raza, madre, camada..." oninput="applyFilters()">
</div>
<div id="content"></div>
<div class="bnav">
  <button class="nb on" onclick="setTab('libre',document.getElementById('st-libre'))">
    <div class="nb-ic">&#x1F415;</div><div class="nb-lb">Libres</div>
  </button>
  <button class="nb" onclick="setTab('anticipo',document.getElementById('st-anticipo'))">
    <div class="nb-ic">&#x1F4CB;</div><div class="nb-lb">Anticipo</div>
  </button>
  <button class="nb" onclick="setTab('vacunas',document.getElementById('st-vacunas'))">
    <div class="nb-ic">&#x1F489;</div><div class="nb-lb">Vacunas</div>
  </button>
  <button class="nb" id="nb-srch" onclick="toggleSearch()">
    <div class="nb-ic">&#x1F50D;</div><div class="nb-lb">Buscar</div>
  </button>
</div>
<script>
var API_KEY='AIzaSyCrIsF7R_koev3lU2H0jW4y9L7-tk_vAYY';
var SHEET_ID='14GzqWO5Fx2toh-gByAIIlon-QV0IPgOwNNtBARhg4EE';
var RANGE='Cachorros!A:R';
var C={no:0,camada:1,tipo:2,madre:3,padre:4,sexo:5,fn:6,parvo:7,cano1:8,cano2:9,hunt1:10,hunt2:11,estado:12,precio:13,anticipo:14,pendiente:15,notas:16,fecha_camada:17};
var PROTO={parvo:28,cano1:42,cano2:56,hunt1:21,hunt2:22};
var VLBL={parvo:'Parvomune',cano1:'Cano x1',cano2:'Cano x2',hunt1:'Hunter x1',hunt2:'Hunter x2'};
var data=[],curTab='libre',curRaza='all',srchOpen=false;
function pd(s){if(!s||!s.trim())return null;var p=s.trim().split('/');if(p.length!==3)return null;return new Date(+p[2],+p[1]-1,+p[0]);}
function tod(){var d=new Date();d.setHours(0,0,0,0);return d;}
function wks(fn){if(!fn)return 0;return Math.floor((tod()-fn)/(7*86400000));}
function due(fn,days){if(!fn)return null;var d=new Date(fn);d.setDate(d.getDate()+days);return d;}
function vacSt(fn,done,days){if(done&&done.trim())return 'done';var d=due(fn,days);if(!d)return 'unk';var diff=Math.floor((d-tod())/86400000);if(diff<0)return 'ov';if(diff<=7)return 'sn';return 'ft';}
function vacDiff(fn,days){var d=due(fn,days);if(!d)return null;return Math.floor((d-tod())/86400000);}
function fmtQ(v){if(!v||v==='')return '--';var n=parseFloat(v);return isNaN(n)?v:'Q'+n.toLocaleString('es-GT');}
function vd(done){return '<div class="vd '+(done?'vd-y':'vd-n')+'"></div>';}
function rdot(w){return w<6?'rd-n':w<8?'rd-w':'rd-y';}
function bCls(t){t=t.toLowerCase();if(t.includes('beagle'))return 'bt-b';if(t.includes('dogo'))return 'bt-d';if(t.includes('sabueso'))return 'bt-s';if(t.includes('belga')||t.includes('malinois'))return 'bt-p';if(t.includes('malt')||t.includes('golden'))return 'bt-m';return 'bt-x';}
function shT(t){if(t.includes('Pastor Belga Malinois'))return 'P.B. Malinois';if(t.includes('Maltes')||t.includes('Golden')||t.includes('Malt'))return 'Maltes/Golden';return t;}
async function loadData(){
  var btn=document.getElementById('rfbtn');btn.classList.add('spin');
  document.getElementById('ld-txt').textContent='Cargando datos...';
  try{
    var url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(RANGE)+'?key='+API_KEY;
    var res=await fetch(url);if(!res.ok)throw new Error('HTTP '+res.status);
    var json=await res.json();var rows=json.values||[];if(rows.length<2)throw new Error('Sin datos');
    data=rows.slice(1).map(function(r){return{no:parseInt(r[C.no])||0,camada:r[C.camada]||'',tipo:r[C.tipo]||'',madre:r[C.madre]||'',padre:r[C.padre]||'',sexo:r[C.sexo]||'',fn:pd(r[C.fn]),fnStr:r[C.fn]||'',parvo:r[C.parvo]||'',cano1:r[C.cano1]||'',cano2:r[C.cano2]||'',hunt1:r[C.hunt1]||'',hunt2:r[C.hunt2]||'',estado:r[C.estado]||'',precio:r[C.precio]||'',anticipo:r[C.anticipo]||'',pendiente:r[C.pendiente]||'',notas:r[C.notas]||'',fecha_camada:r[C.fecha_camada]||''};}).filter(function(r){return r.no>0;});
    buildFilters();render();
    document.getElementById('upd').textContent=new Date().toLocaleTimeString('es-GT',{hour:'2-digit',minute:'2-digit'});
    setTimeout(function(){document.getElementById('loading').classList.add('fade');setTimeout(function(){document.getElementById('loading').style.display='none';},400);},300);
  }catch(e){document.getElementById('ld-txt').textContent='Error: '+e.message;}
  btn.classList.remove('spin');
}
function buildFilters(){
  var cr=data.filter(function(r){return r.estado==='Criadero';});
  var razas=[...new Set(cr.map(function(r){return r.tipo;}))].sort();
  var f=document.getElementById('fltrs');
  f.innerHTML='<button class="ftb on" onclick="setRaza(\'all\',this)">Todos</button>';
  razas.forEach(function(raza){var b=document.createElement('button');b.className='ftb';b.textContent=shT(raza);b.onclick=function(){setRaza(raza,this);};f.appendChild(b);});
}
function groupBy(arr){
  var m=new Map();
  arr.forEach(function(p){var k=p.camada+'|'+p.madre+'|'+p.padre;if(!m.has(k))m.set(k,{camada:p.camada,madre:p.madre,padre:p.padre,tipo:p.tipo,fecha:p.fecha_camada,pups:[]});m.get(k).pups.push(p);});
  return [...m.values()];
}
function render(){
  var cr=data.filter(function(r){return r.estado==='Criadero';});
  var libres=cr.filter(function(r){return !r.anticipo||r.anticipo==='';});
  var anticipo=cr.filter(function(r){return r.anticipo&&parseFloat(r.pendiente||0)>0;});
  var urgent=cr.filter(function(r){return ['parvo','cano1','cano2','hunt1','hunt2'].some(function(v){return ['ov','sn'].includes(vacSt(r.fn,r[v],PROTO[v]));});});
  document.getElementById('cn-libre').textContent=libres.length;
  document.getElementById('cn-anticipo').textContent=anticipo.length;
  document.getElementById('cn-vacunas').textContent=urgent.length;
  var html='';
  html+='<div class="sec" id="sec-libre"><div class="sec-hd"><div class="sdot sdot-g"></div><div class="sec-ttl">Sin anticipo</div><div class="sec-cnt">'+libres.length+' cachorros</div></div>';
  groupBy(libres).forEach(function(g){
    html+='<div class="bg-hdr"><span class="btag '+bCls(g.tipo)+'">'+shT(g.tipo)+'</span><span class="bcam">'+g.camada+' · '+g.madre+' x '+g.padre+' · '+g.fecha+'</span></div>';
    g.pups.forEach(function(p){var w=p.fn?wks(p.fn):0;html+='<div class="pup" data-raza="'+p.tipo+'" data-s="'+p.no+' '+p.tipo+' '+p.madre+' '+p.camada+'"><div class="pno '+(p.sexo==='Macho'?'pm':'pf')+'">'+p.no+'</div><div class="pinf"><div class="pr1"><span class="praza">'+shT(p.tipo)+'</span><span class="psex">'+p.sexo+'</span><span class="pcam">'+p.camada+'</span></div><div class="pr2">'+p.madre+' x '+p.padre+' · '+w+' sem</div><div class="vrow"><span class="vl">Vac</span>'+vd(p.parvo)+vd(p.cano1)+vd(p.cano2)+'<div class="vsep"></div><span class="vl">Desp</span>'+vd(p.hunt1)+vd(p.hunt2)+'</div></div><div class="prt"><div class="pprc">'+fmtQ(p.precio)+'</div><span class="rdot '+rdot(w)+'"></span></div></div>';});
  });
  if(!libres.length)html+='<div class="empty">Sin cachorros libres</div>';
  html+='</div>';
  html+='<div class="sec" id="sec-anticipo"><div class="sec-hd"><div class="sdot sdot-a"></div><div class="sec-ttl">Con anticipo recibido</div><div class="sec-cnt">'+anticipo.length+' cachorros</div></div>';
  anticipo.forEach(function(p){var w=p.fn?wks(p.fn):0;var ant=parseFloat(p.anticipo)||0;var prec=parseFloat(p.precio)||0;var pend=parseFloat(p.pendiente)||0;var pct=prec?Math.round(ant/prec*100):0;html+='<div class="rc" data-raza="'+p.tipo+'" data-s="'+p.no+' '+p.tipo+' '+p.madre+' '+p.camada+'"><div class="rc-top" onclick="tog(this)"><div class="rno '+(p.sexo==='Macho'?'pm':'pf')+'">'+p.no+'</div><div class="ri"><div class="rn">'+shT(p.tipo)+' '+p.sexo+'</div><div class="rs">'+p.camada+' · '+p.madre+' x '+p.padre+' · '+w+' sem</div></div><div class="rbdg rbdg-a">Q'+pend.toLocaleString('es-GT')+' pend.</div></div><div class="rc-body"><div class="prog"><div class="progf" style="width:'+pct+'%"></div></div><div class="rrows"><div class="rr"><span class="rk">Total acordado</span><span class="rv">'+fmtQ(p.precio)+'</span></div><div class="rr"><span class="rk">Anticipo recibido</span><span class="rv rv-g">'+fmtQ(p.anticipo)+'</span></div><div class="rr"><span class="rk">Pendiente</span><span class="rv rv-a">'+fmtQ(p.pendiente)+'</span></div></div>'+(p.notas?'<div class="rnote">'+p.notas+'</div>':'')+'<div class="rvacs"><span class="vl">Vac</span>'+vd(p.parvo)+vd(p.cano1)+vd(p.cano2)+'<div class="vsep"></div><span class="vl">Desp</span>'+vd(p.hunt1)+vd(p.hunt2)+'</div></div></div>';});
  if(!anticipo.length)html+='<div class="empty">Sin cachorros con anticipo</div>';
  html+='</div>';
  var vacAlerts=[];
  cr.forEach(function(p){var pending=['parvo','cano1','cano2','hunt1','hunt2'].filter(function(v){var st=vacSt(p.fn,p[v],PROTO[v]);return st==='ov'||st==='sn';});if(!pending.length)return;var worst=pending.some(function(v){return vacSt(p.fn,p[v],PROTO[v])==='ov';})?'ov':'sn';vacAlerts.push({p:p,pending:pending,worst:worst});});
  vacAlerts.sort(function(a,b){return (a.worst==='ov'?0:1)-(b.worst==='ov'?0:1);});
  var ovCnt=vacAlerts.filter(function(a){return a.worst==='ov';}).length;
  var snCnt=vacAlerts.filter(function(a){return a.worst==='sn';}).length;
